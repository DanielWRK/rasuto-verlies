<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Rasuto Verlies</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <    <!-- 1. PANTALLA INICIO -->
    <div id="pantalla-inicio" class="pantalla">
        <h1>Rasuto Verlies</h1>
        <p>Muévete con WASD. Apunta y ataca con el Ratón. Esquiva con Shift.</p>
        <button id="btn-jugar">Nueva Partida</button>
        <button id="btn-cargar">Cargar Partida</button> 
    </div>

    <!-- 2. PANTALLA PAUSA -->
    <div id="pantalla-pausa" class="pantalla" style="display: none;">
        <div id="panel-debug" class="pantalla" style="display: none; background: rgba(0,20,0,0.95); border: 2px solid #0f0;">
            <h1 style="color: #0f0;">⚙️ MODO DESARROLLADOR</h1>
            <div style="text-align: left; color: white; margin-bottom: 20px; font-size: 18px;">
                <h3>Enemigos y Mundo</h3>
                <label><input type="checkbox" id="dbg-enemigos" checked> IA de Enemigos Activa</label><br>
                
                <h3>Estadísticas del Jugador</h3>
                <label>Zona/Nivel Actual: <input type="number" id="dbg-zona" value="1" min="1" style="width: 60px;"></label><br>
                <label>Salud Actual: <input type="number" id="dbg-hp" value="3" style="width: 60px;"></label><br>
                
                <label>Arma Equipada: 
                    <select id="dbg-arma" style="padding: 5px;">
                        <option value="punios">Puños</option>
                        <option value="espada">Espada</option>
                        <option value="arco">Arco</option>
                        <option value="lanza">Lanza</option>
                    </select>
                </label><br>
            </div>
            <button id="btn-cerrar-debug" style="background-color: #0f0; color: black; font-weight: bold;">GUARDAR Y REANUDAR</button>
        </div>
        <h1>PAUSA</h1>
        <div style="display: flex; gap: 20px; margin-top: 20px;">
            <button id="btn-reanudar">Continuar</button>
            <button id="btn-guardar">Guardar Progreso</button> 
            <button id="btn-salir">Abandonar Partida</button>
        </div>
    </div>

    <!-- 3. PANTALLA COFRE (🚨 AHORA ESTÁ AFUERA Y SEPARADA) -->
    <div id="pantalla-cofre" class="pantalla" style="display: none; position: absolute; z-index: 100; background: rgba(20, 20, 35, 0.95); border: 2px solid #ffb74d;">
        <h1 style="color: #ffb74d; letter-spacing: 2px;">🎁 BENDICIÓN DE COFRE 🎁</h1>
        <p style="font-size: 16px; margin-bottom: 30px;">Elige una mejora para tu personaje:</p>
        <div id="contenedor-opciones" style="display: flex; gap: 20px;">
        </div>
    </div>

    <!-- 4. CONTENEDOR DEL JUEGO -->
    <div id="contenedor-juego" style="display: none; position: relative;">
        <canvas id="gameCanvas" width="800" height="800"></canvas>
    </div>

    <script src="js/config_armas.js"></script>    
    <script src="js/config_enemigos.js"></script>
    <script src="js/config_jefes.js"></script> 
    <script src="js/estado.js"></script>         
    <script src="js/motor_fisico.js"></script>   
    <script src="js/motor_grafico.js"></script>  
    <script src="js/main.js"></script>           
    <script src="js/controles.js"></script>   
       
</body>
