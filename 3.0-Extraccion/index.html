<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Rasuto Verlies</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="pantalla-inicio" class="pantalla">
        <h1>Rasuto Verlies</h1>
        <p>Muévete con WASD. Apunta y ataca con el Ratón. Esquiva con Espacio u O.</p>
        <button id="btn-jugar">Nueva Partida</button>
        <button id="btn-cargar">Cargar Partida</button> 
    </div>

    <div id="pantalla-pausa" class="pantalla" style="display: none;">
        <div id="panel-debug" class="pantalla" style="display: none; background: rgba(0,20,0,0.95); border: 2px solid #0f0;">
        <h1 style="color: #0f0;">⚙️ MODO DESARROLLADOR</h1>
        
        <div style="text-align: left; color: white; margin-bottom: 20px; font-size: 18px;">
            <h3>Enemigos y Mundo</h3>
            <label><input type="checkbox" id="dbg-enemigos" checked> IA de Enemigos Activa (Desmarcar para congelarlos)</label><br>
            
            <h3>Estadísticas del Jugador</h3>
            <label>Salud Actual: <input type="number" id="dbg-hp" value="3" style="width: 60px;"></label><br>
            <label>Arma Equipada: 
                <select id="dbg-arma" style="padding: 5px;">
                    <option value="espada">Espada (Abanico)</option>
                    <option value="arco">Arco (Preparación Futura)</option>
                    <option value="lanza">Lanza (Preparación Futura)</option>
                </select>
            </label><br>
            
            <h3>Mejoras (Toggles de Pruebas)</h3>
            <label><input type="checkbox" id="dbg-fuego"> Espada de Fuego (Daño extra)</label><br>
            <label><input type="checkbox" id="dbg-dash"> Dash Invencible / Dañino</label><br>
        </div>
        
        <button id="btn-cerrar-debug" style="background-color: #0f0; color: black; font-weight: bold;">GUARDAR Y REANUDAR</button>
    </div>
        <h1>PAUSA</h1>
        <div id="pantalla-cofre" class="pantalla" style="display: none; background: rgba(20, 20, 35, 0.95); border: 2px solid #ffb74d;">
            <h1 style="color: #ffb74d; letter-spacing: 2px;">🎁 BENDICIÓN DE COFRE 🎁</h1>
            <p style="font-size: 16px; margin-bottom: 30px;">Elige una mejora para tu personaje:</p>
            <div id="contenedor-opciones" style="display: flex; gap: 20px;">
             </div>
         </div>
        <div style="display: flex; gap: 20px; margin-top: 20px;">
            <button id="btn-reanudar">Continuar</button>
            <button id="btn-guardar">Guardar Progreso</button> 
            <button id="btn-salir">Abandonar Partida</button>
        </div>
    </div>

    <div id="contenedor-juego" style="display: none;">
        <canvas id="gameCanvas" width="800" height="800"></canvas>
    </div>

    <script src="js/config.js"></script>         <!-- 1. El diccionario de armas -->
    <script src="js/estado.js"></script>         <!-- 2. La memoria global y variables -->
    <script src="js/motor_fisico.js"></script>   <!-- 3. Colisiones y movimiento -->
    <script src="js/motor_grafico.js"></script>  <!-- 4. Dibujo en el canvas -->
    <script src="js/main.js"></script>           <!-- 5. Bucle principal y generación -->
    <script src="js/controles.js"></script>      <!-- 6. Teclado, ratón y botones -->
</body>
